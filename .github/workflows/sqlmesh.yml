name: SQLMesh Scheduled Run

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: 

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install "sqlmesh[postgres]" duckdb
      - name: Run SQLMesh
        env:
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: sqlmesh plan --auto-apply